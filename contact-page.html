    <!-- CSS Mastersheet Link-->

    <style>
        .human_animated {
            position: relative;
            animation-name: human_hand;
            animation-duration: 1.2s;
        }

        .air_animated {
            position: relative;
            animation-name: air_hand;
            animation-duration: 1.2s;
        }

        @keyframes human_hand {
            0% {
                left: 600px;
                top: 0px;
            }

            100% {
                left: 0px;
                top: 0px;
            }
        }

        @keyframes air_hand {
            0% {
                left: -600px;
                top: 0px;
            }

            100% {
                left: 0px;
                top: 0px;
            }
        }
    </style>
</head>
